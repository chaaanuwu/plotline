name: Run API Tests

on:
  push:
    branches: [main, feat/*]
    paths:
      - 'server/**'
  pull_request:
    branches: [main]
    paths:
      - 'server/**'

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:7.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      # 1. Checkout the code
      - uses: actions/checkout@v3

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22

      # 3. Install dependencies
      - name: Install dependencies
        run: npm ci
        working-directory: ./server  # run npm ci in server folder

      # 4. Setup test environment
      - name: Setup test environment
        run: |
          cp .env.test.local .env
        working-directory: ./server

      # 5. Run tests
      - name: Run Jest Tests
        run: npm test -- --detectOpenHandles --forceExit
        working-directory: ./server
        env:
          NODE_ENV: test
          DB_URI: mongodb://localhost:27017/plotline_test
          JWT_SECRET: testplotline
